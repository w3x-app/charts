replicaCount: 1

fullnameOverride: "hai-gateway"

serviceAccount:
  create: true
  automount: true

service:
  type: ClusterIP
  port: 80
  targetPort: 6053

ingress:
  enabled: false

autoscaling:
  enabled: false

global:
  image:
    repository: registry.wenex.org/w3x/hai-backend
    pullPolicy: IfNotPresent
    tag: "1.0.1"
  imagePullSecrets: []
  # **********************
  # Secrets
  # **********************
  # Keep real secrets in an untracked local override file.
  secrets:
    aes: "" # default: random 64 chars
    altcha:
      hmacKey: "" # default: random 64 chars
  # **********************
  # Environment Variables
  # **********************
  environments:
    debug: "clt:*"
    timeout: "90000"
    nodeEnv: "develop"
    # GraphQl mutation support
    graphqlMutationSupport: false
    # **********************
    # Internationalization
    # **********************
    locale: "en"
    region: "IR"
    tz: "Asia/Tehran"
    # **********************
    # Messaging Config
    # **********************
    # Kavenegar
    kavenegar:
      senders: ""
      apiKey: ""
    # Melipayamak
    melipayamak:
      user: ""
      pass: ""
      from: "50002710091657"
    # **********************
    # AI Config
    # **********************
    llm:
      provider: "ollama" # staging default
      fallbackProvider: ""
      fallbackOperations: ""
    sharifLlm:
      baseUrl: "https://alphapi.aip.sharif.ir"
      bearerToken: "" # optional for staging; set only when provider/fallback is sharif
    # Ollama
    ollama:
      baseUrl: "http://10.16.0.110:11434"
      chatModel: "qwen2.5:32b"
      embeddingModel: "qwen3-embedding:8b"
    # RAG
    rag:
      provider: "ollama"
      embeddingModel: "qwen3-embedding:8b"
      askLimit: 5
      ollama:
        chatModel: "qwen2.5:32b"
        embeddingModel: "qwen3-embedding:8b"
    strictToken: true
    # Client
    uid: "696243e966914baa77f23029"
    cid: "696243c95c286ae81cf99283"
    appId: "696244985a9adb822a9e82c2"
    clientId: "696243f5e66fe27741623caf"
    clientSecret: ""
    # Platform
    root:
      domain: "hai.behayand.ir"
      subject: "root@hai.behayand.ir"
    platformUrl: "http://localhost:3010"
    # Backend
    backend:
      authorizationCqrs: ""
    apiKey: ""
    # Frontend
    frontend:
      baseUrl: "http://localhost:3005"
      assetsUrl: "http://localhost:8088"
    # **********************
    # Logging Services
    # **********************
    # Sentry
    sentry:
      dsn: ""
      maxBreadcrumbs: 10
      tracesSampleRate: 1.0
    # **********************
    # Storage Services
    # **********************
    # Redis
    redis:
      host: "localhost"
      port: 6379
      prefix: "hai"
      password: ""
    # Mongo
    mongo:
      host: "mongodb-primary:27017,mongodb-secondary:27018"
      db: "client"
      prefix: "hai"
      user: "root"
      pass: ""
      query: "replicaSet=rs0&retryWrites=true&authSource=admin"
    # PostgreSQL
    postgres:
      db: "client"
      prefix: "hai"
      user: "postgres"
      password: ""
      port: "5432"
      host: "postgres-cluster-rw.cnpg-system.svc.cluster.local"
      pool:
        max: 5
    # **********************
    # Broker Services
    # **********************
    # Nats
    nats:
      user: ""
      pass: ""
      timeout: "90000"
      servers: "nats://localhost:4222"
    # **********************
    # OAuth Information
    # **********************
    # Google
    google:
      client:
        id: ""
        secret: ""
        redirectUri: "/oauth"
    # **********************
    # Push Information
    # **********************
    # VAPID
    vapid:
      publicKey: "BPH_WDhPo9M8wRpcMpHZD9_O1ba2t4hsrerYv35nWTCTCfOSb2G4TWXnj1EBZV1AkkidFuSZeZ0Kq_hDGoPfJtw"
      privateKey: ""
    # **********************
    # Telemetry Services
    # **********************
    # OpenTelemetry
    otlp:
      port: "4318"
      host: "localhost"
    # **********************
    # APM Service
    # **********************
    # Elastic APM
    apm:
      serverUrl: "https://localhost:8200"
      secretToken: ""
      verifyServerCert: "false"
    machineId: ""
    # **********************
    # Wenex Coworkers
    # **********************
    coworkers: [] # list of coworkers
  # **********************
  # Client Configuration
  # **********************
  configuration:
    services:
      host: hai-services.wenex-client.svc.cluster.local
    workers:
      host: hai-workers.wenex-client.svc.cluster.local
# **********************
# Client Backend
# **********************
assets:
  enabled: false
services:
  enabled: false
workers:
  enabled: false
